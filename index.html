<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgetz - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Tech Background */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            animation: pulse 8s infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 4rem;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Brand Header */
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .highlight {
            color: var(--accent);
            font-weight: 600;
        }

        /* Notify Form */
        .notify-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .notify-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .notify-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .notify-btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        /* Success Message */
        .success-msg {
            display: none;
            color: #4ade80;
            font-weight: 500;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        /* Footer Socials */
        .socials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .social-icon {
            color: var(--text-muted);
            font-size: 1.25rem;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-icon:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 2rem;
            }
            .notify-form {
                flex-direction: column;
            }
            .notify-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo">Gadgetz.lk</div>
        <p class="tagline">
            We are upgrading our infrastructure. The ultimate <span class="highlight">e-commerce and repair tracking</span> experience is deploying soon.
        </p>

        <form class="notify-form" id="notifyForm">
            <input type="email" class="notify-input" id="emailInput" placeholder="Enter your email for launch updates..." required>
            <button type="submit" class="notify-btn">Notify Me</button>
        </form>
        <div class="success-msg" id="successMsg">
            <i class="fas fa-check-circle"></i> You're on the list! We'll ping you when we go live.
        </div>

        <div class="socials">
            <a href="#" class="social-icon" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon" title="Contact Support"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script>
        document.getElementById('notifyForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent actual form submission for the demo
            
            const email = document.getElementById('emailInput').value;
            const btn = document.querySelector('.notify-btn');
            
            // Simulate API Call / Loading state
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            btn.style.opacity = '0.8';

            setTimeout(() => {
                // Hide form and show success message
                document.getElementById('notifyForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }, 800);
        });
    </script>
</body>
</html>
